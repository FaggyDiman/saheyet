<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHEYET RPG</title>

    <!-- Стили -->
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='colors.css') }}">
</head>
{% from 'macros.html' import loc_button %}
<body>

    <!-- Затемнение -->
    <div class="overlay" id="overlay"></div>

    <!-- Кнопка меню -->
    <button class="menu-toggle" id="menuBtn" type="button">☰</button>



    <!-- Боковая панель -->
    <aside class="sidescreen" id="sideScreen">
        <!-- Навигация сверху -->
        <nav class="side-nav">
            <button class="side-nav-btn active" data-view="status" >{{loc.t("nav_main")}}</button>
            <button class="side-nav-btn" data-view="settings">{{loc.t("nav_settings")}}</button>
        </nav>

        <!-- Вкладка: Основа -->
        <div id="side-view-status" class="side-view active">
            <div class="portrait-block">
                <img src="{{url_for('static', path='images/' + player_state.portrait)}}" class="portrait" alt="Knight" style="width: 180px; height: auto; ">
                <div style="text-align: center; font-size: 0.8rem; margin-top: 10px;">
                    <a class="{{ player_state.health_commentary_stylecolor }}">
                        {{ loc.t(player_state.health_commentary) }}
                    </a>
                </div>
            </div>
        </div>

        <!-- Вкладка:  -->
        <div id="side-view-settings" class="side-view">
            <div class="lang-toggle-wrapper">
                <a id="langToggle" class="lang-toggle" href="/toggle-language">
                    {{ "Change language" if lang == "ru" else "Сменить язык" }}
                </a>
            </div>
        </div>
    </aside>

    <!-- Основной контент -->
    <main class="mainsheet" id="mainsheet" data-default-location="{{ active_location }}" data-extra-location="{{ extra_location }}">
        <div id="locationContainer" class="location-area"></div>
        <div id="appendContainer" class="location-area"></div>
    </main>

    <!-- Скрипты -->
    <script defer src="{{ url_for('static', path='main.js') }}"></script>

</body>
</html>
