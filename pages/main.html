<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHEYET RPG</title>

    <!-- Стили -->
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='colors.css') }}">
</head>
{% from 'macros.html' import loc_button %}
<body>

    <!-- Затемнение -->
    <div class="overlay" id="overlay"></div>

    <!-- Кнопка меню -->
    <button class="menu-toggle" id="menuBtn" type="button">☰</button>



    <!-- Боковая панель -->
    <aside class="sidescreen" id="sideScreen">
        <div class="portrait-block">
            <div class="health-text">
                {{ loc.t("health_good") }}
            </div>
        </div>
        <div class="lang-toggle-wrapper">
            <a 
                id="langToggle" 
                class="lang-toggle" 
                href="/toggle-language"
            >
                {{ "Change language" if lang == "ru" else "Сменить язык" }}
            </a>
        </div>
    </aside>

    <!-- Основной контент -->
    <main class="mainsheet" id="mainsheet" data-default-location="{{ active_location }}" data-extra-location="{{ extra_location }}">
        <div id="locationContainer" class="location-area"></div>
        <div id="appendContainer" class="location-area"></div>
    </main>

    <!-- Скрипты -->
    <script defer src="{{ url_for('static', path='main.js') }}"></script>

</body>
</html>
